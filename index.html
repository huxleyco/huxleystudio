<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huxley &amp; Co. · Independent talent and advisory practice</title>
<meta name="description" content="Huxley &amp; Co. is an independent talent and advisory practice. Confidential search, operations, and advisory engagements held directly by the principals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
/* Huxley & Co. · site styles */

:root {
  --bg: #FAFAF7;
  --text: #0F0F0F;
  --text-muted: #4A4A4A;
  --meta: #6A6A6A;
  --meta-faint: #9A9A9A;
  --rule: rgba(15, 15, 15, 0.15);
  --rule-strong: #0F0F0F;
  --accent: #9C3520;

  --font-sans: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  --max-width: 1180px;
  --pad-x: 44px;
  --pad-y: 28px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
  transition: color 0.15s ease;
}

a:hover { color: var(--accent); }

.page {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: var(--pad-y) var(--pad-x);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- Document header ---------- */

.doc-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  padding-bottom: 14px;
  border-bottom: 0.5px solid var(--rule-strong);
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--meta);
  text-transform: uppercase;
  align-items: baseline;
}

.doc-header .brand {
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s ease;
}

.doc-header .brand:hover { color: var(--accent); }

.doc-header nav {
  display: flex;
  gap: 28px;
}

.doc-header nav a {
  position: relative;
  padding-bottom: 2px;
}

.doc-header nav a.current { color: var(--text); }

.doc-header nav a.current::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -3px;
  height: 0.5px;
  background: var(--accent);
}

/* ---------- Main column ---------- */

main {
  flex: 1;
  padding: 72px 0 56px;
  display: flex;
  flex-direction: column;
}

/* ---------- Section label with signet ---------- */

.section-label {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  color: var(--meta);
  text-transform: uppercase;
}

.signet {
  width: 22px;
  height: 22px;
  display: block;
  flex-shrink: 0;
  color: var(--text);
}

/* ---------- Hero headline ---------- */

h1.hero {
  font-family: var(--font-sans);
  font-size: clamp(36px, 5.5vw, 56px);
  line-height: 1.04;
  font-weight: 500;
  letter-spacing: -0.028em;
  margin: 36px 0 0;
  max-width: 18ch;
  color: var(--text);
}

/* ---------- Homepage hero variant (centered, large signet) ---------- */

.hero-centered {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px 0 64px;
}

.hero-centered .signet-large {
  width: 88px;
  height: 88px;
  display: block;
  color: var(--text);
}

.hero-centered .section-label-centered {
  margin-top: 22px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.24em;
  color: var(--meta);
  text-transform: uppercase;
}

.hero-centered h1.hero {
  margin: 44px auto 0;
  text-align: center;
  max-width: 18ch;
}

@media (max-width: 820px) {
  .hero-centered { padding: 16px 0 40px; }
  .hero-centered .signet-large { width: 64px; height: 64px; }
  .hero-centered h1.hero { margin-top: 32px; }
}

/* ---------- Content prose ---------- */

.lede {
  margin-top: 40px;
  font-family: var(--font-sans);
  font-size: 20px;
  line-height: 1.55;
  color: var(--text);
  max-width: 44ch;
  font-weight: 400;
  letter-spacing: -0.006em;
}

.body {
  margin-top: 36px;
  max-width: 60ch;
}

.body p {
  font-size: 15.5px;
  line-height: 1.75;
  color: var(--text-muted);
  margin: 0 0 1.1em;
}

/* ---------- Numbered entries (services) ---------- */

.entries {
  margin-top: 64px;
  display: grid;
  gap: 44px;
}

.entry {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 28px;
  padding-top: 20px;
  border-top: 0.5px solid var(--rule);
}

.entry-num {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--meta-faint);
  text-transform: uppercase;
  padding-top: 6px;
}

.entry-body h3 {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.014em;
  margin: 0 0 14px;
  color: var(--text);
}

.entry-body p {
  font-size: 15.5px;
  line-height: 1.75;
  color: var(--text-muted);
  margin: 0;
  max-width: 58ch;
}

/* ---------- Principals (studio page) ---------- */

.principals {
  margin-top: 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}

.principal {
  padding-top: 20px;
  border-top: 0.5px solid var(--rule);
}

.principal .label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.2em;
  color: var(--meta-faint);
  text-transform: uppercase;
  margin-bottom: 18px;
}

.principal h3 {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.014em;
  margin: 0 0 6px;
}

.principal .role {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--meta);
  text-transform: uppercase;
  margin-bottom: 18px;
}

.principal p {
  font-size: 15px;
  line-height: 1.72;
  color: var(--text-muted);
  margin: 0;
}

/* ---------- Enquire form ---------- */

.enquire {
  margin-top: 56px;
  max-width: 52ch;
}

.field {
  display: block;
  margin-bottom: 28px;
}

.field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--meta);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field input,
.field textarea {
  display: block;
  width: 100%;
  font-family: var(--font-sans);
  font-size: 15.5px;
  line-height: 1.6;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 0.5px solid var(--rule-strong);
  padding: 6px 0 10px;
  outline: none;
  border-radius: 0;
  transition: border-color 0.15s ease;
}

.field input:focus,
.field textarea:focus {
  border-bottom-color: var(--accent);
}

.field textarea {
  resize: vertical;
  min-height: 110px;
}

.submit {
  display: inline-block;
  background: transparent;
  border: none;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--text);
  text-transform: uppercase;
  padding: 10px 0;
  cursor: pointer;
  border-bottom: 0.5px solid var(--text);
  transition: color 0.15s ease, border-color 0.15s ease;
  margin-top: 4px;
}

.submit:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.direct-contact {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 0.5px solid var(--rule);
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 18px 28px;
  max-width: 56ch;
}

.direct-contact .dc-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  color: var(--meta);
  text-transform: uppercase;
  padding-top: 3px;
}

.direct-contact .dc-value {
  font-family: var(--font-sans);
  font-size: 14.5px;
  color: var(--text);
  line-height: 1.55;
}

.direct-contact .dc-value a { color: var(--text); }
.direct-contact .dc-value a:hover { color: var(--accent); }

/* ---------- Legal pages ---------- */

.legal-heading {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.008em;
  margin: 32px 0 10px;
  color: var(--text);
}

.legal-heading:first-child { margin-top: 8px; }

.body strong {
  font-weight: 500;
  color: var(--text);
}

.legal-meta {
  margin-top: 48px;
  padding-top: 16px;
  border-top: 0.5px solid var(--rule);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--meta);
  text-transform: uppercase;
}

.footer-links {
  text-align: right;
  display: flex;
  gap: 20px;
  justify-content: flex-end;
}

.footer-links a { color: var(--meta); }
.footer-links a:hover { color: var(--accent); }

/* ---------- Document footer ---------- */

.doc-footer {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 24px;
  padding-top: 14px;
  border-top: 0.5px solid var(--rule-strong);
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--meta);
  text-transform: uppercase;
  align-items: baseline;
}

.doc-footer .center { text-align: center; }
.doc-footer .cta { text-align: right; color: var(--accent); }

/* ---------- Page-load reveal ---------- */

@media (prefers-reduced-motion: no-preference) {
  .reveal > * {
    opacity: 0;
    transform: translateY(6px);
    animation: reveal 0.7s cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
  }
  .reveal > *:nth-child(1) { animation-delay: 0.05s; }
  .reveal > *:nth-child(2) { animation-delay: 0.18s; }
  .reveal > *:nth-child(3) { animation-delay: 0.34s; }
  .reveal > *:nth-child(4) { animation-delay: 0.52s; }
  .reveal > *:nth-child(5) { animation-delay: 0.72s; }

  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }
}

/* ---------- Responsive ---------- */

@media (max-width: 820px) {
  :root {
    --pad-x: 24px;
    --pad-y: 22px;
  }
  .doc-header,
  .doc-footer {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .doc-header nav {
    flex-wrap: wrap;
    gap: 18px;
  }
  .doc-footer .cta { text-align: left; }
  .doc-footer .center { text-align: left; }
  h1.hero { font-size: clamp(30px, 9vw, 42px); max-width: none; }
  main { padding: 48px 0 36px; }
  .entry { grid-template-columns: 1fr; gap: 10px; }
  .principals { grid-template-columns: 1fr; gap: 36px; }
  .lede { font-size: 18px; }
}

/* ---------- Print ---------- */

@media print {
  body { background: #fff; }
  .doc-header, .doc-footer { border-color: #000; }
  .reveal > * { opacity: 1; transform: none; animation: none; }
}

</style>
</head>
<body>
<div class="page">

  <header class="doc-header">
    <a href="index.html" class="brand" aria-label="Huxley &amp; Co. home">Huxley &amp; Co.</a>
    <nav aria-label="Primary">
      <a href="work.html">The work</a>
      <a href="studio.html">The studio</a>
      <a href="inquire.html">Inquire</a>
    </nav>
  </header>

  <main class="reveal hero-centered">
    <svg class="signet-large" width="88" height="88" viewBox="0 0 22 22" aria-hidden="true">
      <rect x="0.75" y="0.75" width="20.5" height="20.5" fill="none" stroke="currentColor" stroke-width="0.4"/>
      <line x1="7.5" y1="5.5" x2="7.5" y2="16.5" stroke="currentColor" stroke-width="0.65"/>
      <line x1="14.5" y1="5.5" x2="14.5" y2="16.5" stroke="currentColor" stroke-width="0.65"/>
      <line x1="7.5" y1="11" x2="14.5" y2="11" stroke="currentColor" stroke-width="0.65"/>
    </svg>
    <div class="section-label-centered">№ 001 &nbsp;·&nbsp; The practice</div>
    <h1 class="hero">An independent talent and advisory practice.</h1>
  </main>

  <footer class="doc-footer">
    <span>thehuxleycompany.com</span>
    <span class="center">LA &nbsp;·&nbsp; London &nbsp;·&nbsp; MMXXVI</span>
    <span class="footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </span>
  </footer>

</div>
</body>
</html>
